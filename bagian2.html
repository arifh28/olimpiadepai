<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bagian 2 - Latihan Soal Olimpiade PAI MALKA Festival 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f4f7f6; color: #333; }
        .quiz-container { max-width: 800px; margin: 40px auto; background: #ffffff; border-radius: 12px; padding: 30px; }
        .quiz-header { border-bottom: 2px solid #eef2f5; padding-bottom: 20px; margin-bottom: 20px; text-align: center; }
        .quiz-header h1 { font-weight: 700; color: #1a5cff; font-size: 1.8rem; }
        .question-box { font-size: 1.15rem; font-weight: 600; margin-bottom: 25px; line-height: 1.6; }
        #options-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (max-width: 576px) { #options-container { grid-template-columns: 1fr; } }
        .option-btn { text-align: left; padding: 15px 20px; font-size: 1rem; border-radius: 12px; border: none; color: #fff; transition: all 0.2s ease; height: 100%; display: flex; align-items: center; justify-content: space-between; }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.8; }
        .btn-opt-blue { background-color: #0d6efd; } .btn-opt-orange { background-color: #fd7e14; } .btn-opt-purple { background-color: #6f42c1; } .btn-opt-cyan { background-color: #0dcaf0; color: #000 !important; }
        .btn-correct { background-color: #198754 !important; color: #fff !important; box-shadow: 0 0 15px rgba(25,135,84,0.6) !important; transform: scale(1.02); z-index: 1; }
        .btn-incorrect { background-color: #dc3545 !important; color: #fff !important; }
        .navigation-box { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; border-top: 2px solid #eef2f5; padding-top: 20px; }
        .progress-text { font-weight: 600; color: #6c757d; }
    </style>
</head>
<body>

<div class="container">
    <div class="quiz-container shadow">
        <div class="quiz-header">
            <h1><i class="fa-solid fa-book-quran me-2"></i> Latihan Soal Olimpiade PAI</h1>
            <h5 class="fw-bold mt-2 text-info">Bagian 2: Iman Kepada Malaikat</h5> <p class="text-muted mb-0">Peserta: <span id="display-name" class="fw-bold text-dark"></span></p>
        </div>

        <div id="quiz-area">
            <div class="question-box" id="question-text">Memuat soal...</div>
            <div id="options-container"></div>
            <div class="navigation-box">
                <span class="progress-text" id="progress-text">Soal 0 dari 0</span>
                <button class="btn btn-primary px-4 py-2 fw-semibold" id="next-btn" disabled>Selanjutnya <i class="fa-solid fa-arrow-right ms-1"></i></button>
            </div>
        </div>

        <div id="result-area" class="text-center d-none">
            <h2 class="mb-3 text-success"><i class="fa-solid fa-trophy mb-3" style="font-size: 3rem;"></i><br>Kuis Selesai!</h2>
            <h4 class="mb-2">Skor Anda: <span id="final-score" class="fw-bold text-primary"></span> / <span id="total-score"></span></h4>
            <p class="text-muted mb-4" id="saving-status">Menyimpan nilai ke server...</p>
            <button class="btn btn-outline-primary me-2" onclick="location.reload()"><i class="fa-solid fa-rotate-right me-1"></i> Ulangi Kuis</button>
            <a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house me-1"></i> Kembali ke Menu</a>
        </div>
    </div>
</div>

<audio id="sound-benar" src="benar.mp3" preload="auto"></audio>
<audio id="sound-salah" src="salah.mp3" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script> <script>
    // --- 1. Validasi Akses Peserta ---
    const userName = localStorage.getItem("userName");
    if (!userName) {
        // Tendang kembali ke index.html jika nama belum diisi
        window.location.href = "index.html"; 
    } else {
        document.getElementById('display-name').textContent = userName;
    }

    // --- 2. Logika Kuis ---
    let questions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let hasAnswered = false;

    const NAMA_BAGIAN = "Bagian 2: Iman Kepada Malaikat"; // Ganti string ini untuk bagian2.html dst.

    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const nextBtn = document.getElementById('next-btn');
    const progressText = document.getElementById('progress-text');
    const quizArea = document.getElementById('quiz-area');
    const resultArea = document.getElementById('result-area');
    const finalScoreLabel = document.getElementById('final-score');
    const totalScoreLabel = document.getElementById('total-score');
    const savingStatus = document.getElementById('saving-status');
    
    const soundBenar = document.getElementById('sound-benar');
    const soundSalah = document.getElementById('sound-salah');

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    fetch('bagian2.json') // Ganti json ini untuk bagian2.html dst.
        .then(response => response.json())
        .then(data => {
            questions = shuffleArray(data);
            loadQuestion();
        })
        .catch(error => {
            questionText.innerHTML = '<span class="text-danger">Gagal memuat soal.</span>';
        });

    function loadQuestion() {
        hasAnswered = false;
        nextBtn.disabled = true;
        
        const currentData = questions[currentQuestionIndex];
        optionsContainer.innerHTML = '';
        questionText.textContent = `${currentQuestionIndex + 1}. ${currentData.question}`;
        
        let mappedOptions = currentData.options.map((optText, originalIndex) => {
            return { text: optText, isCorrect: originalIndex === currentData.answer };
        });

        mappedOptions = shuffleArray(mappedOptions);
        const colorClasses = ['btn-opt-blue', 'btn-opt-orange', 'btn-opt-purple', 'btn-opt-cyan'];

        mappedOptions.forEach((optObj, index) => {
            const btn = document.createElement('button');
            btn.className = `btn option-btn ${colorClasses[index]} shadow-sm`;
            if (optObj.isCorrect) btn.dataset.correct = "true";
            
            const letter = String.fromCharCode(65 + index);
            btn.innerHTML = `<span><strong>${letter}.</strong> ${optObj.text}</span>`;
            
            btn.onclick = () => selectAnswer(optObj.isCorrect, btn);
            optionsContainer.appendChild(btn);
        });

        progressText.textContent = `Soal ${currentQuestionIndex + 1} dari ${questions.length}`;
    }

    function selectAnswer(isCorrect, selectedBtn) {
        if (hasAnswered) return;
        hasAnswered = true;
        
        const allButtons = document.querySelectorAll('.option-btn');
        allButtons.forEach(btn => btn.disabled = true);

        if (isCorrect) {
            selectedBtn.classList.add('btn-correct');
            selectedBtn.innerHTML += '<i class="fa-solid fa-circle-check fs-5"></i>';
            soundBenar.currentTime = 0; soundBenar.play();
            score++;
        } else {
            selectedBtn.classList.add('btn-incorrect');
            selectedBtn.innerHTML += '<i class="fa-solid fa-circle-xmark fs-5"></i>';
            soundSalah.currentTime = 0; soundSalah.play();
            
            allButtons.forEach(btn => {
                if (btn.dataset.correct === "true") {
                    btn.classList.add('btn-correct');
                    btn.innerHTML += '<i class="fa-solid fa-circle-check fs-5"></i>';
                }
            });
        }
        nextBtn.disabled = false;
    }

    nextBtn.addEventListener('click', () => {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    });

    async function showResult() {
        quizArea.classList.add('d-none');
        resultArea.classList.remove('d-none');
        finalScoreLabel.textContent = score;
        totalScoreLabel.textContent = questions.length;

        // 1. Simpan nilai ke LocalStorage (format: nilai_bagian_namapeserta)
        const storageKey = `nilai_${NAMA_BAGIAN}_${userName}`;
        localStorage.setItem(storageKey, score);

        // 2. Simpan nilai ke Supabase menggunakan fungsi di script.js
        try {
            await saveScoreToSupabase(NAMA_BAGIAN, score);
            savingStatus.innerHTML = "<i class='fa-solid fa-check text-success'></i> Nilai berhasil disimpan di server!";
        } catch (e) {
            savingStatus.innerHTML = "<i class='fa-solid fa-triangle-exclamation text-danger'></i> Gagal terhubung ke server. Nilai tersimpan secara lokal.";
        }
    }
</script>
</body>
</html>
